name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for diff --check on PRs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: git diff --check (whitespace)
        run: |
          set -e
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            # Pull request: check only files touched in this PR
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD" --
          else
            # Push: check the last commit
            git log -1 --format=%H
            git diff --check HEAD^ HEAD -- 2>/dev/null || git diff --check HEAD --
          fi

      - name: Bash syntax checks
        run: |
          set -e
          for f in install.sh install-into-project.sh uninstall.sh pack.sh; do
            if [ -f "$f" ]; then
              echo "bash -n $f"
              bash -n "$f"
            fi
          done

      - name: PowerShell syntax checks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @('install.ps1','install-into-project.ps1','uninstall.ps1','pack.ps1')
          $any = $false
          foreach ($f in $files) {
            if (Test-Path $f) {
              $any = $true
              $tokens = $null; $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $f), [ref]$tokens, [ref]$errors) | Out-Null
              if ($errors.Count -ne 0) {
                Write-Host "PowerShell syntax errors in $f:"
                $errors | ForEach-Object { Write-Host "  $_" }
                exit 1
              }
              Write-Host "ok: $f"
            }
          }
          if (-not $any) { Write-Host "no .ps1 files found to check" }

      - name: Pack from source (round-trip)
        run: ./pack.sh

      - name: Verify skill (frontmatter + bootstrap + package integrity)
        run: python3 validate.py
