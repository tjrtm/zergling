<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="2">
<title>agent world — waiting</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a0e;color:#9aa0aa;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    display:grid;place-items:center;overflow:hidden}
  .stage{text-align:center}
  .dot{width:10px;height:10px;border-radius:50%;background:#9aa0aa;
    margin:0 auto;animation:p 1.6s ease-in-out infinite;
    box-shadow:0 0 24px rgba(154,160,170,.4)}
  @keyframes p{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}
  small{display:block;margin-top:2rem;opacity:.5;font-size:.72rem;
    letter-spacing:.18em;text-transform:uppercase}
  em{display:block;margin-top:.4rem;opacity:.3;font-size:.65rem;
    letter-spacing:.1em;font-style:normal}
</style>
</head>
<body>
  <div class="stage">
    <div class="dot"></div>
    <small>waiting for the agent to open its eyes</small>
    <em>this page auto-reloads. leave it open.</em>
  </div>
</body>
</html>
